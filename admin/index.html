<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Filmhjulet · Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #ffd1dc 70%, #fce4ec 100%);
      font-family: 'Lato', sans-serif;
      color: #8b4a62;
      padding: 1.2rem 0.8rem 3rem;
    }

    .shell {
      max-width: 780px;
      margin: 0 auto;
    }

    header.card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 1.8rem 1.5rem;
      box-shadow: 0 8px 40px rgba(199, 100, 140, 0.18);
      text-align: center;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      color: #c2607e;
      margin-bottom: 0.2rem;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #b07090;
      letter-spacing: 0.08em;
    }
    .info {
      margin-top: 0.9rem;
      font-size: 0.8rem;
      color: #b07090;
      background: rgba(255,255,255,0.55);
      padding: 0.6rem 0.8rem;
      border-radius: 0.8rem;
    }

    .panel {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1.2rem 1.1rem;
      box-shadow: 0 6px 24px rgba(199, 100, 140, 0.14);
      margin-bottom: 1rem;
    }
    .panel h2 {
      font-family: 'Playfair Display', serif;
      color: #c2607e;
      font-size: 1.25rem;
      margin-bottom: 0.8rem;
    }

    .add-form, .controls, .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .add-form input, .controls input, .controls select {
      flex: 1 1 140px;
      min-width: 0;
      padding: 0.6rem 0.8rem;
      border-radius: 0.7rem;
      border: 1.5px solid #f8bbd0;
      background: #fff;
      font-family: inherit;
      color: #8b4a62;
      font-size: 0.92rem;
    }
    .add-form input:focus, .controls input:focus, .controls select:focus {
      outline: none;
      border-color: #c2607e;
    }
    .add-form button, .actions button {
      padding: 0.6rem 1.1rem;
      border-radius: 999px;
      border: none;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      background: #f8bbd0;
      color: #8b4a62;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .add-form button:hover, .actions button:hover { background: #e8a0b4; color: #fff; }

    .actions button.primary {
      background: linear-gradient(160deg, #e8a0b4 0%, #c2607e 100%);
      color: #fff;
    }
    .actions button.primary:hover { filter: brightness(1.05); }
    .actions button.danger {
      background: transparent;
      color: #c2607e;
      border: 1.5px solid #e8a0b4;
    }
    .actions button.danger:hover { background: #fde7ef; color: #c2607e; }

    .movies-list {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-top: 0.9rem;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 0.2rem;
    }
    .movie-row {
      background: #fdf4f8;
      border-radius: 0.8rem;
      padding: 0.6rem 0.8rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem;
      align-items: center;
    }
    .movie-row .meta { min-width: 0; }
    .movie-row .title {
      font-weight: 600;
      color: #c2607e;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .movie-row .sub {
      font-size: 0.78rem;
      color: #b07090;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 0.15rem;
    }
    .status {
      font-size: 0.7rem;
      padding: 0.12rem 0.55rem;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .status-available { background: #e7f7e5; color: #4a8a3a; }
    .status-watched   { background: #ffd6e7; color: #c2607e; }
    .status-hidden    { background: #eee;    color: #777; }
    .tag-custom       { background: #fff2c8; color: #a37800; padding: 0.12rem 0.5rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; }

    .row-actions { display: flex; gap: 0.3rem; flex-wrap: wrap; justify-content: flex-end; }
    .row-actions button {
      padding: 0.32rem 0.7rem;
      font-size: 0.75rem;
      border: none;
      border-radius: 999px;
      background: #f8bbd0;
      color: #8b4a62;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }
    .row-actions button:hover { background: #e8a0b4; color: #fff; }
    .row-actions button.danger { background: transparent; color: #c2607e; border: 1px solid #e8a0b4; }
    .row-actions button.danger:hover { background: #fde7ef; color: #c2607e; }

    .back {
      text-align: center;
      font-size: 0.85rem;
      margin-top: 1rem;
    }
    .back a {
      color: #b07090;
      text-decoration: none;
      margin: 0 0.5rem;
    }
    .back a:hover { color: #c2607e; text-decoration: underline; }

    .error {
      background: #fde7ef;
      color: #8b4a62;
      padding: 0.7rem 0.9rem;
      border-radius: 0.8rem;
      font-size: 0.9rem;
    }

    @media (max-width: 480px) {
      .movie-row { grid-template-columns: 1fr; }
      .row-actions { justify-content: flex-start; }
      .panel { padding: 1rem 0.9rem; border-radius: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="card">
      <h1>🎬 Filmhjulet · Admin</h1>
      <p class="subtitle">Administrer filmlisten</p>
      <p class="info">
        Endringene lagres lokalt i denne nettleseren. Bruk <strong>Last ned CSV</strong> for å lage en ny <code>movies.csv</code> og lagre den i GitHub-repoet – da får alle besøkende den oppdaterte listen.
      </p>
    </header>

    <section class="panel">
      <h2>Legg til film</h2>
      <form id="addForm" class="add-form">
        <input type="text" id="newTitle" placeholder="Tittel *" required />
        <input type="text" id="newYear" placeholder="År" inputmode="numeric" maxlength="4" />
        <input type="text" id="newId" placeholder="IMDb ID (tt...)" pattern="tt\d+" title="IMDb ID starter med tt etterfulgt av tall, f.eks. tt0468569" />
        <button type="submit">Legg til</button>
      </form>
    </section>

    <section class="panel">
      <h2>Filmer (<span id="total">0</span>)</h2>
      <div class="controls">
        <input type="search" id="search" placeholder="Søk…" />
        <select id="filter">
          <option value="all">Alle</option>
          <option value="available">Tilgjengelige</option>
          <option value="watched">Sett</option>
          <option value="hidden">Skjulte</option>
          <option value="custom">Egne tillagte</option>
        </select>
      </div>
      <div id="moviesList" class="movies-list"></div>
      <div id="errorBox" class="error" style="display:none;margin-top:0.8rem;"></div>
    </section>

    <section class="panel">
      <h2>Eksport & tilbakestilling</h2>
      <div class="actions">
        <button id="exportCsv" class="primary">Last ned CSV</button>
        <button id="resetWatched">Tilbakestill «sett»</button>
        <button id="resetRemoved">Vis skjulte igjen</button>
        <button id="resetAll" class="danger">Nullstill alle lokale endringer</button>
      </div>
    </section>

    <p class="back">
      <a href="../index.html">← Til forsiden</a>
      <a href="../filmhjulet.html">Til hjulet</a>
    </p>
  </div>

  <script>
    const STORAGE = {
      watched: 'filmhjulet.watched.v1',
      added:   'filmhjulet.added.v1',
      removed: 'filmhjulet.removed.v1'
    };

    function getJSON(key, fallback) {
      try {
        const v = JSON.parse(localStorage.getItem(key));
        return Array.isArray(v) ? v : (fallback || []);
      } catch { return fallback || []; }
    }
    function setJSON(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') { field += '"'; i++; }
            else inQuotes = false;
          } else field += c;
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else if (c !== '\r') field += c;
        }
      }
      if (field.length || row.length) { row.push(field); rows.push(row); }
      return rows;
    }

    function csvEscape(v) {
      const s = (v == null) ? '' : String(v);
      if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    async function loadMaster() {
      const res = await fetch('../movies.csv', { cache: 'no-cache' });
      if (!res.ok) throw new Error('Fant ikke movies.csv (status ' + res.status + ')');
      const text = await res.text();
      const rows = parseCSV(text).filter(r => r.length > 1 || (r.length === 1 && r[0].trim()));
      if (!rows.length) return [];
      const headers = rows[0].map(h => h.trim());
      const iConst = headers.indexOf('Const');
      const iTitle = headers.indexOf('Title');
      const iYear  = headers.indexOf('Year');
      return rows.slice(1).map(r => ({
        id:    (iConst >= 0 ? r[iConst] : '') || '',
        title: (iTitle >= 0 ? r[iTitle] : '') || '',
        year:  (iYear  >= 0 ? r[iYear]  : '') || ''
      })).filter(m => m.title);
    }

    function genLocalId() {
      return 'local-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    let master = [];

    function getAll() {
      const added = getJSON(STORAGE.added);
      const watched = new Set(getJSON(STORAGE.watched));
      const removed = new Set(getJSON(STORAGE.removed));
      const all = [
        ...master.map(m => ({ ...m, source: 'master' })),
        ...added.map(m => ({ ...m, source: 'custom' }))
      ];
      return all.map(m => ({
        ...m,
        status: watched.has(m.id) ? 'watched' : (removed.has(m.id) ? 'hidden' : 'available')
      }));
    }

    function render() {
      const all = getAll();
      document.getElementById('total').textContent = all.length;

      const q = document.getElementById('search').value.trim().toLowerCase();
      const filter = document.getElementById('filter').value;

      let shown = all;
      if (filter === 'available') shown = shown.filter(m => m.status === 'available');
      else if (filter === 'watched') shown = shown.filter(m => m.status === 'watched');
      else if (filter === 'hidden')  shown = shown.filter(m => m.status === 'hidden');
      else if (filter === 'custom')  shown = shown.filter(m => m.source === 'custom');
      if (q) shown = shown.filter(m => m.title.toLowerCase().includes(q));

      const list = document.getElementById('moviesList');
      list.innerHTML = '';
      if (!shown.length) {
        list.innerHTML = '<p style="color:#b07090;font-size:0.9rem;padding:0.8rem;text-align:center;">Ingen filmer matcher.</p>';
        return;
      }

      const frag = document.createDocumentFragment();
      shown.forEach(m => frag.appendChild(renderRow(m)));
      list.appendChild(frag);
    }

    function renderRow(m) {
      const row = document.createElement('div');
      row.className = 'movie-row';

      const meta = document.createElement('div');
      meta.className = 'meta';

      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = m.title;

      const sub = document.createElement('div');
      sub.className = 'sub';

      if (m.year) {
        const y = document.createElement('span');
        y.textContent = m.year;
        sub.appendChild(y);
      }
      if (m.id) {
        const idEl = document.createElement('span');
        idEl.textContent = m.id;
        idEl.style.fontFamily = 'monospace';
        idEl.style.fontSize = '0.72rem';
        sub.appendChild(idEl);
      }
      const statusEl = document.createElement('span');
      statusEl.className = 'status status-' + m.status;
      statusEl.textContent = m.status === 'available' ? 'Tilgjengelig' : (m.status === 'watched' ? 'Sett' : 'Skjult');
      sub.appendChild(statusEl);

      if (m.source === 'custom') {
        const tag = document.createElement('span');
        tag.className = 'tag-custom';
        tag.textContent = 'Egen';
        sub.appendChild(tag);
      }

      meta.appendChild(title);
      meta.appendChild(sub);

      const actions = document.createElement('div');
      actions.className = 'row-actions';

      if (m.status === 'available') {
        actions.appendChild(mkBtn('Marker sett', () => toggleWatched(m.id, true)));
        actions.appendChild(mkBtn('Skjul',        () => toggleRemoved(m.id, true)));
      } else if (m.status === 'watched') {
        actions.appendChild(mkBtn('Tilbakestill', () => toggleWatched(m.id, false)));
      } else if (m.status === 'hidden') {
        actions.appendChild(mkBtn('Vis igjen',    () => toggleRemoved(m.id, false)));
      }
      if (m.source === 'custom') {
        const btn = mkBtn('Slett', () => deleteCustom(m.id));
        btn.classList.add('danger');
        actions.appendChild(btn);
      }

      row.appendChild(meta);
      row.appendChild(actions);
      return row;
    }

    function mkBtn(text, handler) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = text;
      b.addEventListener('click', handler);
      return b;
    }

    function toggleWatched(id, on) {
      const list = getJSON(STORAGE.watched);
      const idx = list.indexOf(id);
      if (on && idx < 0) list.push(id);
      if (!on && idx >= 0) list.splice(idx, 1);
      setJSON(STORAGE.watched, list);
      render();
    }
    function toggleRemoved(id, on) {
      const list = getJSON(STORAGE.removed);
      const idx = list.indexOf(id);
      if (on && idx < 0) list.push(id);
      if (!on && idx >= 0) list.splice(idx, 1);
      setJSON(STORAGE.removed, list);
      render();
    }
    function deleteCustom(id) {
      if (!confirm('Slette denne egne filmen permanent?')) return;
      const list = getJSON(STORAGE.added).filter(m => m.id !== id);
      setJSON(STORAGE.added, list);
      // also clean up any watched/removed entries referring to it
      setJSON(STORAGE.watched, getJSON(STORAGE.watched).filter(x => x !== id));
      setJSON(STORAGE.removed, getJSON(STORAGE.removed).filter(x => x !== id));
      render();
    }

    document.getElementById('addForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const title = document.getElementById('newTitle').value.trim();
      const year  = document.getElementById('newYear').value.trim();
      const idIn  = document.getElementById('newId').value.trim();
      if (!title) return;
      if (idIn && !/^tt\d+$/.test(idIn)) {
        alert('IMDb-ID må være på formen tt0000000.');
        return;
      }
      const id = idIn || genLocalId();
      const added = getJSON(STORAGE.added);
      if (added.some(m => m.id === id) || master.some(m => m.id === id)) {
        alert('En film med denne IDen finnes allerede.');
        return;
      }
      added.push({ id, title, year });
      setJSON(STORAGE.added, added);
      e.target.reset();
      render();
    });

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('filter').addEventListener('change', render);

    document.getElementById('exportCsv').addEventListener('click', () => {
      const added = getJSON(STORAGE.added);
      const removed = new Set(getJSON(STORAGE.removed));
      const combined = [...master, ...added].filter(m => !removed.has(m.id));

      const header = ['Position', 'Const', 'Title', 'Year'];
      const lines = [header.map(csvEscape).join(',')];
      combined.forEach((m, i) => {
        lines.push([i + 1, m.id, m.title, m.year].map(csvEscape).join(','));
      });
      const csv = lines.join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'movies.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    document.getElementById('resetWatched').addEventListener('click', () => {
      if (!confirm('Fjerne alle «sett»-markeringer?')) return;
      setJSON(STORAGE.watched, []);
      render();
    });
    document.getElementById('resetRemoved').addEventListener('click', () => {
      if (!confirm('Vise alle skjulte filmer igjen?')) return;
      setJSON(STORAGE.removed, []);
      render();
    });
    document.getElementById('resetAll').addEventListener('click', () => {
      if (!confirm('Dette fjerner alle lokale endringer: sett-markeringer, skjulte filmer og egne tillagte filmer. Fortsette?')) return;
      setJSON(STORAGE.watched, []);
      setJSON(STORAGE.removed, []);
      setJSON(STORAGE.added, []);
      render();
    });

    (async () => {
      try {
        master = await loadMaster();
        render();
      } catch (err) {
        const box = document.getElementById('errorBox');
        box.style.display = 'block';
        box.textContent = 'Kunne ikke laste movies.csv: ' + err.message;
      }
    })();
  </script>
</body>
</html>
