<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmhjulet</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-color: #ffdce8;
      --card-bg: rgba(255, 255, 255, 0.45);
      --card-border: rgba(255, 255, 255, 0.6);
      --text-main: #8c3f5d;
      --text-sub: #b05c7b;
      --accent: #d96c8e;
      --shadow: rgba(200, 110, 140, 0.25);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 20% 30%, #ffc4db 0px, transparent 50%),
        radial-gradient(at 80% 80%, #ffd1e1 0px, transparent 50%),
        radial-gradient(at 50% 50%, #fff0f5 0px, transparent 50%);
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
      text-align: center;
      padding: 1.5rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.15;
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
    }

    .blobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      filter: blur(60px);
      pointer-events: none;
    }
    
    .blob {
      position: absolute;
      border-radius: 50%;
      background: #ffb3c6;
      animation: float 20s infinite ease-in-out alternate;
    }
    .blob:nth-child(1) { width: 30vw; height: 30vw; top: -10%; left: -10%; background: #ff9fb8; }
    .blob:nth-child(2) { width: 40vw; height: 40vw; bottom: -20%; right: -10%; background: #ffc2d4; animation-delay: -5s; }
    .blob:nth-child(3) { width: 25vw; height: 25vw; top: 40%; left: 60%; background: #fcdee6; animation-delay: -10s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(5%, 10%) scale(1.1); }
      100% { transform: translate(-5%, -5%) scale(0.9); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--card-border);
      border-radius: 2.5rem;
      padding: 3rem 2rem;
      box-shadow: 0 30px 60px var(--shadow), inset 0 2px 0 rgba(255,255,255,0.8);
      max-width: 640px;
      width: 100%;
      animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(3rem, 6vw, 4rem);
      font-weight: 400;
      font-style: italic;
      color: var(--text-main);
      margin-bottom: 0.3rem;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-sub);
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .wheel-wrap {
      position: relative;
      width: 100%;
      max-width: 460px;
      aspect-ratio: 1;
      margin: 0.5rem auto 2rem;
    }

    .pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 35px solid var(--text-main);
      z-index: 2;
      filter: drop-shadow(0 4px 6px rgba(139, 74, 98, 0.5));
    }

    .wheel {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
      box-shadow: 0 10px 40px rgba(199, 100, 140, 0.4), inset 0 0 0 8px rgba(255,255,255,0.6);
      transform: rotate(0deg);
      transition: none;
      will-change: transform;
    }

    .spin-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #fff;
      background: linear-gradient(135deg, #f5a3b8 0%, #d96c8e 100%);
      border: none;
      border-radius: 999px;
      padding: 1.2rem 3rem;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(217, 108, 142, 0.4);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .spin-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: 0.5s ease;
    }

    .spin-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 15px 35px rgba(217, 108, 142, 0.5);
    }

    .spin-btn:hover:not(:disabled)::after {
      left: 100%;
    }

    .spin-btn:active:not(:disabled) { transform: translateY(0); }
    .spin-btn:disabled { opacity: 0.45; cursor: not-allowed; filter: grayscale(50%); }

    .count {
      font-size: 0.9rem;
      color: var(--text-sub);
      margin-top: 1.5rem;
      letter-spacing: 0.05em;
    }

    .links {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }
    .links a {
      color: var(--text-sub);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      position: relative;
      background: none;
    }
    .links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 100%; height: 1px;
      background: var(--text-main);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .links a:hover { color: var(--text-main); }
    .links a:hover::after { transform: scaleX(1); }

    .empty {
      padding: 3rem 1rem 1rem;
      font-family: 'Instrument Serif', serif;
      font-size: 2.2rem;
      font-style: italic;
      color: var(--accent);
    }
    .empty .reset-link {
      display: inline-block;
      margin-top: 1rem;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      color: var(--accent);
      text-decoration: underline;
    }

    .error {
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 1rem;
      color: var(--text-main);
      font-size: 1rem;
      margin-top: 1rem;
      border: 1px solid rgba(255,0,0,0.1);
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(139, 74, 98, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 100;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 40px 80px rgba(139, 74, 98, 0.3), inset 0 2px 0 rgba(255,255,255,0.8);
      animation: pop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: center;
    }

    @keyframes pop {
      from { transform: scale(0.9) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    .poster {
      width: 60%;
      max-width: 220px;
      aspect-ratio: 2/3;
      margin: 0 auto 1.5rem;
      display: block;
      object-fit: cover;
      border-radius: 1.2rem;
      box-shadow: 0 15px 35px rgba(139, 74, 98, 0.25);
      background: rgba(255,255,255,0.5);
    }
    .poster-fallback {
      width: 60%;
      max-width: 220px;
      aspect-ratio: 2/3;
      margin: 0 auto 1.5rem;
      border-radius: 1.2rem;
      background: linear-gradient(135deg, #ffd6e7 0%, #d96c8e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: #fff;
      box-shadow: 0 15px 35px rgba(139, 74, 98, 0.25);
    }

    .modal h2 {
      font-family: 'Instrument Serif', serif;
      color: var(--text-main);
      font-size: 2.4rem;
      font-style: italic;
      margin-bottom: 0.2rem;
      line-height: 1.1;
    }
    .modal .year {
      color: var(--text-sub);
      font-size: 1.1rem;
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .modal-buttons button {
      flex: 1 1 140px;
      padding: 1rem;
      border-radius: 999px;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .modal-buttons button:active { transform: translateY(1px); }
    
    .btn-primary {
      background: linear-gradient(135deg, #f5a3b8 0%, #d96c8e 100%);
      color: #fff;
      box-shadow: 0 8px 20px rgba(217, 108, 142, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(217, 108, 142, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.6);
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-secondary:hover:not(:disabled) {
      background: rgba(255,255,255,0.9);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(217, 108, 142, 0.15);
    }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }

    @media (max-width: 420px) {
      .card { padding: 2rem 1.5rem; border-radius: 2rem; }
      .modal { padding: 2rem 1.5rem; }
      .modal h2 { font-size: 2rem; }
    }
  </style>


</head>
<body>
  <div class="blobs">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>

  <div class="blobs">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>

  <div class="card">
    <h1>🎬 Filmhjulet</h1>
    <p class="subtitle">Snurr hjulet og finn kveldens film</p>

    <div id="wheel-container">
      <div class="wheel-wrap">
        <div class="pointer"></div>
        <canvas class="wheel" id="wheel" width="1000" height="1000"></canvas>
      </div>
      <button id="spin" class="spin-btn">Spinn</button>
      <p class="count" id="count"></p>
    </div>

    <div id="empty-state" class="empty" style="display:none;">
      🎉 Alle filmer er sett!
      <br>
      <a href="#" class="reset-link" id="resetLinkEmpty">Tilbakestill listen</a>
    </div>

    <div id="error-state" class="error" style="display:none;"></div>

    <div class="links">
      <a href="index.html">← Tilbake</a>
      <a href="#" id="resetLink">Tilbakestill listen</a>
    </div>
  </div>

  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <img class="poster" id="poster" alt="" />
      <div class="poster-fallback" id="posterFallback" style="display:none;">🎬</div>
      <h2 id="resultTitle"></h2>
      <p class="year" id="resultYear"></p>
      <div class="modal-buttons">
        <button id="seeNow" class="btn-primary">Se nå</button>
        <button id="openStremio" class="btn-secondary">Stremio</button>
        <button id="spinAgain" class="btn-secondary">Spinn på nytt</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE = {
      watched: 'filmhjulet.watched.v1',
      added:   'filmhjulet.added.v1',
      removed: 'filmhjulet.removed.v1'
    };

    function getJSON(key, fallback) {
      try {
        const v = JSON.parse(localStorage.getItem(key));
        return Array.isArray(v) ? v : (fallback || []);
      } catch { return fallback || []; }
    }
    function setJSON(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    // RFC 4180-ish CSV parser (handles quoted fields with embedded commas and escaped quotes)
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') { field += '"'; i++; }
            else inQuotes = false;
          } else field += c;
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else if (c !== '\r') field += c;
        }
      }
      if (field.length || row.length) { row.push(field); rows.push(row); }
      return rows;
    }

    async function loadMaster() {
      const res = await fetch('movies.csv', { cache: 'no-cache' });
      if (!res.ok) throw new Error('Fant ikke movies.csv (status ' + res.status + ')');
      const text = await res.text();
      const rows = parseCSV(text).filter(r => r.length > 1 || (r.length === 1 && r[0].trim()));
      if (!rows.length) return [];
      const headers = rows[0].map(h => h.trim());
      const iConst = headers.indexOf('Const');
      const iTitle = headers.indexOf('Title');
      const iYear  = headers.indexOf('Year');
      return rows.slice(1).map(r => ({
        id:    (iConst >= 0 ? r[iConst] : '') || '',
        title: (iTitle >= 0 ? r[iTitle] : '') || '',
        year:  (iYear  >= 0 ? r[iYear]  : '') || ''
      })).filter(m => m.title);
    }

    async function getEffectiveList() {
      const master  = await loadMaster();
      const added   = getJSON(STORAGE.added);
      const watched = new Set(getJSON(STORAGE.watched));
      const removed = new Set(getJSON(STORAGE.removed));
      return [...master, ...added].filter(m => !watched.has(m.id) && !removed.has(m.id));
    }

    function posterFor(id) {
      if (!id || !/^tt\d+$/.test(id)) return null;
      return 'https://images.metahub.space/poster/medium/' + id + '/img';
    }

    // --- Wheel rendering ---
    const PALETTE = ['#ffd6e7', '#ffb3c6', '#f8bbd0', '#ffc6d5', '#f2a6bd', '#ffa8c0', '#f7c4d5', '#fbc5d8'];

    const wheel = document.getElementById('wheel');
    const ctx = wheel.getContext('2d');
    const W = wheel.width, H = wheel.height;
    const CX = W / 2, CY = H / 2, R = W / 2 - 8;

    const centerImage = new Image();
    centerImage.src = 'Anniken.webp';
    centerImage.onload = () => {
      if (currentMovies && currentMovies.length > 0) {
        drawWheel(currentMovies);
      }
    };

    function drawWheel(movies) {
      ctx.clearRect(0, 0, W, H);
      if (!movies.length) return;
      const slice = (Math.PI * 2) / movies.length;
      const start = -Math.PI / 2;

      movies.forEach((m, i) => {
        const a0 = start + i * slice;
        const a1 = a0 + slice;
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.arc(CX, CY, R, a0, a1);
        ctx.closePath();
        ctx.fillStyle = PALETTE[i % PALETTE.length];
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 2;
        ctx.stroke();

        if (movies.length <= 40) {
          ctx.save();
          ctx.translate(CX, CY);
          ctx.rotate(a0 + slice / 2);
          ctx.textAlign = 'right';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#8b4a62';
          const fs = movies.length <= 10 ? 26
                   : movies.length <= 20 ? 19
                   : movies.length <= 30 ? 14
                   : 11;
          ctx.font = '600 ' + fs + 'px Outfit, sans-serif';
          const maxLen = movies.length <= 10 ? 22
                       : movies.length <= 20 ? 17
                       : movies.length <= 30 ? 14
                       : 12;
          let t = m.title;
          if (t.length > maxLen) t = t.slice(0, maxLen - 1) + '…';
          ctx.fillText(t, R - 18, 0);
          ctx.restore();
        }
      });

      // Outer ring
      ctx.beginPath();
      ctx.arc(CX, CY, R, 0, Math.PI * 2);
      ctx.strokeStyle = '#c2607e';
      ctx.lineWidth = 5;
      ctx.stroke();

      // Center hub
      ctx.save();
      ctx.beginPath();
      ctx.arc(CX, CY, 56, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = '#fff';
      ctx.fill();
      if (centerImage.complete && centerImage.naturalWidth > 0) {
        ctx.drawImage(centerImage, CX - 56, CY - 56, 112, 112);
      } else {
        ctx.fillStyle = '#c2607e';
        ctx.font = 'italic 40px "Instrument Serif", serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🎬', CX, CY + 2);
      }
      ctx.restore();
      
      // Draw border ring over it
      ctx.beginPath();
      ctx.arc(CX, CY, 56, 0, Math.PI * 2);
      ctx.strokeStyle = '#e8a0b4';
      ctx.lineWidth = 4;
      ctx.stroke();
    }

      
      // --- Audio Setup ---
      let audioCtx = null;
      function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }
      function playTick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.05);
      }

      // --- Spin logic ---
    let currentMovies = [];
    let currentSelection = null;
    let currentRotation = 0;
    let spinning = false;

    function resetRotation() {
      wheel.style.transition = 'none';
      wheel.style.transform = 'rotate(0deg)';
      currentRotation = 0;
      // force reflow so the next transition re-applies
      void wheel.offsetHeight;
    }

    function spinTo(index, total) {
      return new Promise(resolve => {
        const sliceDeg = 360 / total;
        const targetCenterCW = (index + 0.5) * sliceDeg;
        const baseTarget = -targetCenterCW;

        const currentMod = ((currentRotation % 360) + 360) % 360;
        const targetMod  = ((baseTarget      % 360) + 360) % 360;
        let delta = targetMod - currentMod;
        if (delta <= 0) delta += 360;
        const fullTurns = 5 + Math.floor(Math.random() * 3);
        delta += 360 * fullTurns;
        // small jitter so the pointer doesn't always land dead-center (kept well inside the sector)
        delta += (Math.random() - 0.5) * sliceDeg * 0.55;

        initAudio();
        const final = currentRotation + delta;
        wheel.style.transition = 'transform 4.6s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
        wheel.style.transform = 'rotate(' + final + 'deg)';
        currentRotation = final;

        let done = false;
        let lastSlice = -1;
        const style = window.getComputedStyle(wheel);
        
        function tickLoop() {
          if (done) return;
          let currentDeg = 0;
          if (style.transform && style.transform !== 'none') {
            const values = style.transform.split('(')[1].split(')')[0].split(',');
            const a = parseFloat(values[0]);
            const b = parseFloat(values[1]);
            currentDeg = Math.atan2(b, a) * (180 / Math.PI);
          }
          if (currentDeg < 0) currentDeg += 360;
          
          const currentSlice = Math.floor(currentDeg / sliceDeg);
          if (lastSlice !== -1 && lastSlice !== currentSlice) {
            playTick();
          }
          lastSlice = currentSlice;
          requestAnimationFrame(tickLoop);
        }
        requestAnimationFrame(tickLoop);

        const onEnd = () => {
          if (done) return;
          done = true;
          wheel.removeEventListener('transitionend', onEnd);
          resolve();
        };
        wheel.addEventListener('transitionend', onEnd);
        // Safety fallback in case transitionend is missed
        setTimeout(onEnd, 5200);
      });
    }

    async function performSpin(excludeIds) {
      if (spinning || !currentMovies.length) return;
      const ex = excludeIds || new Set();
      let candidates = currentMovies
        .map((m, i) => ({ m, i }))
        .filter(({ m }) => !ex.has(m.id));
      // If everyone is excluded (edge case: 1 movie left + re-spin), fall back to all
      if (!candidates.length) candidates = currentMovies.map((m, i) => ({ m, i }));

      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      currentSelection = pick.m;
      spinning = true;
      document.getElementById('spin').disabled = true;
      await spinTo(pick.i, currentMovies.length);
      spinning = false;
      document.getElementById('spin').disabled = false;
      showModal(pick.m);
    }

    function showModal(m) {
      const modal = document.getElementById('modal');
      document.getElementById('resultTitle').textContent = m.title;
      document.getElementById('resultYear').textContent = m.year || '';

      const img = document.getElementById('poster');
      const fb  = document.getElementById('posterFallback');
      const url = posterFor(m.id);
      if (url) {
        img.style.display = '';
        fb.style.display  = 'none';
        img.onerror = () => { img.style.display = 'none'; fb.style.display = ''; };
        img.src = url;
      } else {
        img.style.display = 'none';
        fb.style.display  = '';
      }

      // Can only "spin again" if there's at least 2 movies on the wheel
      document.getElementById('spinAgain').disabled = currentMovies.length <= 1;
      document.getElementById('openStremio').style.display = m.id ? '' : 'none';

      modal.classList.add('open');
    }
    function hideModal() {
      document.getElementById('modal').classList.remove('open');
    }

    function updateUI() {
      const empty = currentMovies.length === 0;
      document.getElementById('wheel-container').style.display = empty ? 'none' : '';
      document.getElementById('empty-state').style.display = empty ? 'block' : 'none';
      if (!empty) {
        drawWheel(currentMovies);
        const n = currentMovies.length;
        document.getElementById('count').textContent = n + ' film' + (n === 1 ? '' : 'er') + ' igjen';
        document.getElementById('spin').disabled = n < 1;
      }
    }

    async function reloadFromStorage() {
      currentMovies = await getEffectiveList();
      updateUI();
    }

    // --- Events ---
    document.getElementById('spin').addEventListener('click', () => performSpin());

    document.getElementById('seeNow').addEventListener('click', async () => {
      if (!currentSelection) return;
      const w = getJSON(STORAGE.watched);
      if (!w.includes(currentSelection.id)) {
        w.push(currentSelection.id);
        setJSON(STORAGE.watched, w);
      }
      currentSelection = null;
      hideModal();
      resetRotation();
      await reloadFromStorage();
    });

    document.getElementById('spinAgain').addEventListener('click', () => {
      const exId = currentSelection ? currentSelection.id : null;
      hideModal();
      performSpin(exId ? new Set([exId]) : new Set());
    });

    document.getElementById('openStremio').addEventListener('click', () => {
      if (!currentSelection || !currentSelection.id) return;
      const imdb = currentSelection.id;
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      if (isMobile) {
        window.open(`https://web.stremio.com/#/detail/movie/${imdb}/${imdb}`, '_blank');
      } else {
        window.location.href = `stremio:///detail/movie/${imdb}/${imdb}`;
      }
    });

    function doReset(e) {
      if (e) e.preventDefault();
      if (!confirm('Tilbakestill listen? Alle "sett"-markeringer fjernes.')) return;
      setJSON(STORAGE.watched, []);
      resetRotation();
      reloadFromStorage();
    }
    document.getElementById('resetLink').addEventListener('click', doReset);
    document.getElementById('resetLinkEmpty').addEventListener('click', doReset);

    // Click on modal backdrop dismisses (but we keep the movie selected-pool unchanged,
    // treated like "spinn på nytt" intent would be ambiguous, so we just close the modal)
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') hideModal();
    });

    // --- Init ---
    (async () => {
      try {
        await reloadFromStorage();
      } catch (err) {
        document.getElementById('wheel-container').style.display = 'none';
        const el = document.getElementById('error-state');
        el.style.display = 'block';
        el.textContent = 'Kunne ikke laste filmlisten: ' + err.message;
      }
    })();
  </script>
</body>
</html>
