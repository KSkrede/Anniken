<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>K+A &lt;3</title>
  <link rel="icon" type="image/png" href="assets/oss.png">
  <link rel="apple-touch-icon" href="assets/oss.png">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg-color: #ffdce8;
      --text-main: #6b2640;
      --text-sub: #b05c7b;
      --accent: #d96c8e;
      --glass-bg: rgba(255, 255, 255, 0.4);
      --glass-border: rgba(255, 255, 255, 0.7);
      --shadow-sm: 0 8px 32px rgba(217, 108, 142, 0.15);
      --shadow-lg: 0 24px 64px rgba(217, 108, 142, 0.25);
    }

    body {
      min-height: 100dvh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #ffd1dc 70%, #fce4ec 100%);
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
      overflow-x: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .app-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: clamp(2rem, 5vh, 4rem) 1.5rem;
      justify-content: space-between;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .hearts {
      font-size: 2rem;
      letter-spacing: 0.3em;
      margin-bottom: 1rem;
      opacity: 0.8;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(3.5rem, 12vw, 5rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--text-main), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .target-date {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
      animation: scaleUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      opacity: 0;
    }

    .time-block {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 1.5rem;
      padding: 1.5rem 1rem;
      text-align: center;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .time-value {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(3.5rem, 10vw, 4.5rem);
      color: var(--accent);
      line-height: 1;
    }

    .time-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 0.5rem;
    }

    .finished-message {
      font-family: 'Instrument Serif', serif;
      font-size: 3rem;
      font-style: italic;
      color: var(--accent);
      text-align: center;
      display: none;
      animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .nav-footer {
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      opacity: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .btn-large {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 1.25rem 2rem;
      background: linear-gradient(135deg, #f5a3b8 0%, #d96c8e 100%);
      color: #fff;
      border-radius: 100px;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      box-shadow: var(--shadow-lg);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
    }

    .btn-large:active {
      transform: scale(0.98);
      box-shadow: var(--shadow-sm);
    }

    /* Desktop Enhancements */
    @media (min-width: 600px) {
      .countdown { grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
      .btn-large:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(217,108,142,0.4); }
    }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes pulseGlow { 0% { transform: scale(0.9); opacity: 0.2; } 100% { transform: scale(1.1); opacity: 0.4; } }

    .hero-image-wrapper {
      position: relative;
      margin: 0 auto 2.5rem;
      width: clamp(200px, 70vw, 360px);
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
      opacity: 0;
      z-index: 1;
    }

    .hero-image {
      width: 100%;
      height: auto;
      border-radius: 1.5rem;
      position: relative;
      z-index: 2;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .hero-image-wrapper:hover .hero-image {
      transform: translateY(-8px) scale(1.03) rotate(-2deg);
    }

    .hero-image-glow {
      position: absolute;
      inset: -15%;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      filter: blur(20px);
      opacity: 0.4;
      z-index: 1;
      border-radius: 50%;
      animation: pulseGlow 4s ease-in-out infinite alternate;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <div class="hearts">🌸 💖 🌸</div>
      <h1>Kristian til Zadar</h1>
      <p class="target-date">15. Mai 2026 — 23:00</p>
    </header>

    <main>
      <div class="countdown" id="countdown">
        <div class="time-block">
          <span class="time-value" id="days">00</span>
          <span class="time-label">Dager</span>
        </div>
        <div class="time-block">
          <span class="time-value" id="hours">00</span>
          <span class="time-label">Timer</span>
        </div>
        <div class="time-block">
          <span class="time-value" id="minutes">00</span>
          <span class="time-label">Min</span>
        </div>
        <div class="time-block">
          <span class="time-value" id="seconds">00</span>
          <span class="time-label">Sek</span>
        </div>
      </div>
      <p class="finished-message" id="finished">🎉 Han er her! 🎉</p>
      
      <div class="hero-image-wrapper">
        <div class="hero-image-glow"></div>
        <img src="assets/zadar.png" alt="Zadar" class="hero-image" loading="lazy">
      </div>
    </main>

    <div class="nav-footer">
      <a class="btn-large" href="filmhjulet.html">
        <span>Gå til Filmhjulet 🎬</span>
      </a>
    </div>
  </div>

  <script>
    const target = new Date('2026-05-15T23:00:00');
    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById('countdown').style.display = 'none';
        document.getElementById('finished').style.display = 'block';
        return;
      }

      const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent    = pad(days);
      document.getElementById('hours').textContent   = pad(hours);
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
