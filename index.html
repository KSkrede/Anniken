<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kristian kommer til Zadar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #ffd1dc 70%, #fce4ec 100%);
      font-family: 'Lato', sans-serif;
      color: #8b4a62;
      text-align: center;
      padding: 2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 3rem 4rem;
      box-shadow: 0 8px 40px rgba(199, 100, 140, 0.18);
      max-width: 700px;
      width: 100%;
    }

    .hearts {
      font-size: 2rem;
      letter-spacing: 0.3rem;
      margin-bottom: 1.2rem;
      color: #e8a0b4;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      color: #c2607e;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1.05rem;
      font-weight: 300;
      color: #b07090;
      margin-bottom: 2.5rem;
      letter-spacing: 0.08em;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(160deg, #ffd6e7 0%, #ffb3c6 100%);
      border-radius: 1.2rem;
      padding: 1.2rem 1.5rem;
      min-width: 90px;
      box-shadow: 0 4px 16px rgba(199, 100, 140, 0.15);
    }

    .time-value {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 700;
      color: #c2607e;
      line-height: 1;
    }

    .time-label {
      font-size: 0.75rem;
      font-weight: 400;
      color: #b07090;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .separator {
      display: flex;
      align-items: center;
      font-size: 2rem;
      color: #e8a0b4;
      padding-top: 0.2rem;
    }

    .target-date {
      font-size: 0.9rem;
      color: #b07090;
      letter-spacing: 0.06em;
    }

    .finished-message {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #c2607e;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hearts">🌸 💖 🌸</div>
    <h1>Kristian kommer til Zadar</h1>
    <p class="subtitle">Gleder oss!</p>

    <div class="countdown" id="countdown">
      <div class="time-block">
        <span class="time-value" id="days">00</span>
        <span class="time-label">Dager</span>
      </div>
      <div class="separator">:</div>
      <div class="time-block">
        <span class="time-value" id="hours">00</span>
        <span class="time-label">Timer</span>
      </div>
      <div class="separator">:</div>
      <div class="time-block">
        <span class="time-value" id="minutes">00</span>
        <span class="time-label">Minutter</span>
      </div>
      <div class="separator">:</div>
      <div class="time-block">
        <span class="time-value" id="seconds">00</span>
        <span class="time-label">Sekunder</span>
      </div>
    </div>

    <p class="finished-message" id="finished">🎉 Kristian er her! 🎉</p>
    <p class="target-date">15. mai 2026 kl. 23:00</p>
  </div>

  <script>
    const target = new Date('2026-05-15T23:00:00');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function tick() {
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById('countdown').style.display = 'none';
        document.getElementById('finished').style.display = 'block';
        return;
      }

      const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent    = pad(days);
      document.getElementById('hours').textContent   = pad(hours);
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
